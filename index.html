<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>機械動作説明</title>
    <style>
      :root {
        --bg: #ffffff; --panel: #ffffff; --line: #d4dae2;
        --text: #1e2733; --muted: #66717f; --accent: #2c7be5; --accent-2: #1a68d1; --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; background: var(--bg); color: var(--text);
        font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; line-height: 1.6;
      }
      .site-header { padding: 16px 20px; border-bottom: 1px solid var(--line); }
      .site-header h1 { font-size: 20px; margin: 0; }
      .site-header .sub { color: var(--muted); font-size: 13px; }
      main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
      .machine-list { list-style: none; margin: 0; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
      .machine-card {
        display: block; text-decoration: none; color: inherit; background: var(--panel);
        border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; transition: border-color 0.1s, box-shadow 0.1s;
      }
      .machine-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(44,123,229,0.12); }
      .machine-card h2 { margin: 0 0 6px; font-size: 16px; }
      .machine-card p { margin: 0; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>機械動作説明</h1>
      <span class="sub">機械を選択してください</span>
    </header>
    <main>
      <ul class="machine-list">
        <li>
          <a class="machine-card" href="bead-remover/">
            <h2>ビードリムーバー</h2>
            <p>電縫管製造ライン 中継ぎ部 溶接ビード除去装置の動作説明</p>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
