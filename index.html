<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ビードリムーバーの動作説明</title>
    <style>
      :root {
        --bg: #ffffff; --panel: #ffffff; --panel-2: #f3f5f8; --line: #d4dae2;
        --text: #1e2733; --muted: #66717f; --accent: #2c7be5; --accent-2: #1a68d1;
        --active: #e8852b; --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; background: var(--bg); color: var(--text);
        font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; line-height: 1.6;
      }
      .site-header {
        padding: 16px 20px; border-bottom: 1px solid var(--line);
        display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
      }
      .site-header h1 { font-size: 20px; margin: 0; }
      .site-header .sub { color: var(--muted); font-size: 13px; }
      .viewer {
        display: grid; grid-template-columns: 1fr 300px; gap: 16px;
        padding: 16px 20px; max-width: 1400px; margin: 0 auto; align-items: start;
      }
      .stage-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; }
      #stage { width: 100%; aspect-ratio: 2 / 1; background: #ffffff; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      #stage svg { width: 100%; height: 100%; display: block; }
      .side { display: flex; flex-direction: column; gap: 14px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
      .panel h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
      .step-info { height: 224px; box-sizing: border-box; overflow: hidden; }
      #step-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
      #step-desc { font-size: 14px; color: var(--muted); }
      #step-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
      .step-item {
        display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
        background: var(--panel-2); cursor: pointer; border: 1px solid transparent; transition: border-color 0.1s, background 0.1s;
      }
      .step-item:hover { border-color: var(--accent-2); }
      .step-item.active { border-color: var(--active); background: #fdf1e4; }
      .step-no { flex: 0 0 24px; height: 24px; border-radius: 50%; background: var(--accent-2); color: #fff; font-size: 12px; display: grid; place-items: center; font-weight: 700; }
      .step-item.active .step-no { background: var(--active); color: #1a2232; }
      .step-label { font-size: 13.5px; }
      .step-item--auto { border-left: 3px solid var(--accent); }
      .auto-tag { margin-left: auto; flex: 0 0 auto; font-size: 10.5px; font-weight: 700; color: var(--accent-2); background: #dcebfb; border-radius: 6px; padding: 1px 6px; letter-spacing: 0.04em; }
      .step-item.active .auto-tag { color: var(--active); background: #fdf1e4; }
      .step-item--manual { border-left: 3px solid #2f9e6e; }
      .step-item--manual .step-no { background: #2f9e6e; }
      .manual-tag { margin-left: auto; flex: 0 0 auto; font-size: 10.5px; font-weight: 700; color: #1f7d54; background: #dff3e9; border-radius: 6px; padding: 1px 6px; letter-spacing: 0.04em; }
      .step-item.active .step-no { background: var(--active); color: #1a2232; }
      .step-item.active .manual-tag { color: var(--active); background: #fdf1e4; }
      .auto-note { margin: -2px 0 10px; font-size: 12px; color: var(--accent-2); display: flex; align-items: center; gap: 6px; }
      .auto-note::before { content: "自動"; font-size: 10.5px; font-weight: 700; color: var(--accent-2); background: #dcebfb; border-radius: 6px; padding: 1px 6px; }
      .controls { display: flex; flex-direction: column; gap: 12px; }
      .btn-row { display: flex; gap: 8px; }
      button { font: inherit; color: var(--text); background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; cursor: pointer; transition: background 0.1s, border-color 0.1s; }
      button:hover:not(:disabled) { border-color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-primary { flex: 1; background: #dcebfb; border-color: var(--accent); color: var(--text); font-weight: 600; }
      .btn-primary:hover { background: #c8defa; }
      .btn-row button { white-space: nowrap; }
      .btn-primary.is-pause { font-size: 12px; }
      .mode-toggle { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      .mode-toggle button { flex: 1; border: none; border-radius: 0; background: var(--panel-2); }
      .mode-toggle button.active { background: #dcebfb; color: var(--text); font-weight: 600; }
      .speed-row { display: flex; align-items: center; gap: 10px; }
      .speed-row label { font-size: 13px; color: var(--muted); flex: 0 0 auto; }
      #speed { flex: 1; accent-color: var(--accent); }
      #speed-val { flex: 0 0 48px; text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; }
      @media (max-width: 860px) { .viewer { grid-template-columns: 1fr; } #stage { aspect-ratio: 16 / 9; } }
    </style>
  </head>

    <script>
      const easings = {
        linear: (t) => t,
        easeInQuad: (t) => t * t,
        easeOutQuad: (t) => t * (2 - t),
        easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
        easeInCubic: (t) => t * t * t,
        easeOutCubic: (t) => 1 - Math.pow(1 - t, 3),
        easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2),
        easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
        easeOutBack: (t) => { const c1 = 1.70158; const c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); },
      };
      function getEasing(name) { return easings[name] || easings.linear; }

      class AnimationEngine {
        constructor(svg, animation) {
          this.svg = svg; this.anim = animation; this.steps = animation.steps || [];
          this.defaults = animation.defaults || {}; this.meta = animation.meta || {};
          this.speed = 1.0; this.mode = "continuous"; this.stepIndex = 0; this.playing = false;
          this.localTime = 0; this.rotPhaseTime = 0; this.phase = "run"; this.delayLeft = 0;
          this.pendingIndex = 0; this._rafId = null; this._lastTs = 0;
          this._tstate = new Map(); this._snapshot = new Map(); this._listeners = {};
          this._collectTargets(); this._snapshotTargets();
          this._durations = this.steps.map((s) => this._computeStepDuration(s));
          this.goToStep(0, false);
        }
        on(event, cb) { (this._listeners[event] ||= []).push(cb); return this; }
        _emit(event, payload) { (this._listeners[event] || []).forEach((cb) => cb(payload)); }
        _collectTargets() {
          this._targets = new Set();
          for (const step of this.steps) for (const m of step.motions || []) {
            const el = this.svg.querySelector(m.target);
            if (el) this._targets.add(el); else console.warn("[engine] target not found:", m.target);
          }
        }
        _snapshotTargets() {
          for (const el of this._targets) this._snapshot.set(el, { transform: el.getAttribute("transform"), opacity: el.style.opacity || el.getAttribute("opacity") });
        }
        _restoreSnapshot() {
          this._tstate.clear();
          for (const el of this._targets) {
            const s = this._snapshot.get(el); if (!s) continue;
            if (s.transform == null) el.removeAttribute("transform"); else el.setAttribute("transform", s.transform);
            if (s.opacity == null || s.opacity === "") el.style.removeProperty("opacity"); else el.style.opacity = s.opacity;
          }
        }
        _computeStepDuration(step) {
          let max = 0;
          for (const m of step.motions || []) { const rep = m.repeat == null ? 0 : m.repeat; if (rep < 0) continue; const d = (m.delay || 0) + (m.duration || 0) * (rep + 1); if (d > max) max = d; }
          return max || 800;
        }
        _stepHasInfRotate(idx) { const s = this.steps[idx]; return !!(s && s.motions && s.motions.some((m) => m.repeat != null && m.repeat < 0)); }
        _stateOf(el) { let st = this._tstate.get(el); if (!st) { st = { tx: 0, ty: 0, rot: 0, sx: 1, sy: 1, pivot: null }; this._tstate.set(el, st); } return st; }
        _applyValue(motion, value) {
          const el = this.svg.querySelector(motion.target); if (!el) return;
          if (motion.type === "opacity") { el.style.opacity = value; return; }
          if (motion.type === "attr") { el.setAttribute(motion.property, value); return; }
          const st = this._stateOf(el);
          switch (motion.property) {
            case "translateX": st.tx = value; break;
            case "translateY": st.ty = value; break;
            case "rotate": st.rot = value; break;
            case "scale": st.sx = value; st.sy = value; break;
            case "scaleX": st.sx = value; break;
            case "scaleY": st.sy = value; break;
          }
          if (motion.pivot) st.pivot = motion.pivot;
          el.setAttribute("transform", this._buildTransform(st));
        }
        _buildTransform(st) {
          let t = "";
          if (st.tx || st.ty) t += `translate(${st.tx},${st.ty}) `;
          if (st.rot) { if (st.pivot) t += `rotate(${st.rot} ${st.pivot[0]} ${st.pivot[1]}) `; else t += `rotate(${st.rot}) `; }
          if (st.sx !== 1 || st.sy !== 1) t += `scale(${st.sx},${st.sy}) `;
          return t.trim();
        }
        _renderMotion(motion, localTime) {
          const d = motion.duration || 0; const delay = motion.delay || 0;
          const rep = motion.repeat == null ? 0 : motion.repeat;
          const ease = getEasing(motion.easing || this.defaults.easing || "linear");
          let t = localTime - delay; let p;
          if (d <= 0) { p = t >= 0 ? 1 : 0; }
          else if (t < 0) { p = 0; }
          else if (rep < 0) { const rt = this.rotPhaseTime - delay; p = rt > 0 ? (rt % d) / d : 0; }
          else { const total = d * (rep + 1); if (t >= total) p = 1; else p = (t % d) / d; }
          const eased = ease(Math.min(Math.max(p, 0), 1));
          const value = motion.from + (motion.to - motion.from) * eased;
          this._applyValue(motion, value);
        }
        _renderStepAt(step, localTime) { for (const m of step.motions || []) this._renderMotion(m, localTime); }
        seekToStepStart(index) {
          this._restoreSnapshot();
          for (let i = 0; i < index; i++) this._renderStepAt(this.steps[i], this._durations[i]);
          if (this.steps[index]) this._renderStepAt(this.steps[index], 0);
          if (this.afterRender) this.afterRender();
        }
        play() {
          if (this.playing) return; if (!this.steps.length) return;
          const dur = this._durations[this.stepIndex];
          if (this.localTime >= dur) {
            if (this.mode === "step") { this.seekToStepStart(this.stepIndex); this.localTime = 0; this.phase = "run"; }
            else if (this.stepIndex >= this.steps.length - 1 && !this.meta.loop) { this.goToStep(0, false); }
          }
          this.playing = true; this._lastTs = performance.now(); this._emit("state", this.getState()); this._loop();
        }
        pause() { this.playing = false; if (this._rafId) cancelAnimationFrame(this._rafId); this._rafId = null; this._emit("state", this.getState()); }
        toggle() { this.playing ? this.pause() : this.play(); }
        setMode(mode) { if (mode !== "continuous" && mode !== "step") return; this.pause(); this.mode = mode; this.seekToStepStart(this.stepIndex); this.localTime = 0; this.phase = "run"; this._emit("state", this.getState()); }
        goToStep(index, autoplay = false) {
          index = Math.min(Math.max(index, 0), Math.max(this.steps.length - 1, 0));
          this.stepIndex = index; this.rotPhaseTime = 0; this.seekToStepStart(index);
          this.localTime = 0; this.phase = "run"; this._emit("stepchange", index); this._emit("state", this.getState());
          if (autoplay) this.play();
        }
        nextStep() { if (this.stepIndex < this.steps.length - 1) this.goToStep(this.stepIndex + 1, this.mode === "step"); }
        prevStep() { if (this.stepIndex > 0) this.goToStep(this.stepIndex - 1, this.mode === "step"); }
        setSpeed(mult) { this.speed = Math.max(0.05, mult); this._emit("state", this.getState()); }
        getState() { return { mode: this.mode, stepIndex: this.stepIndex, stepCount: this.steps.length, playing: this.playing, speed: this.speed }; }
        _loop() { if (!this.playing) return; this._rafId = requestAnimationFrame((ts) => this._tick(ts)); }
        _tick(ts) {
          if (!this.playing) return;
          const dt = (ts - this._lastTs) * this.speed; this._lastTs = ts;
          if (this._stepHasInfRotate(this.stepIndex)) this.rotPhaseTime += dt; else this.rotPhaseTime = 0;
          if (this.phase === "delay") {
            this.delayLeft -= dt;
            if (this.delayLeft <= 0) { this.stepIndex = this.pendingIndex; this.seekToStepStart(this.stepIndex); this.localTime = 0; this.phase = "run"; this._emit("stepchange", this.stepIndex); this._emit("state", this.getState()); }
            this._loop(); return;
          }
          this.localTime += dt;
          const step = this.steps[this.stepIndex]; const dur = this._durations[this.stepIndex];
          this._renderStepAt(step, Math.min(this.localTime, dur));
          if (this.afterRender) this.afterRender();
          if (this.localTime >= dur) {
            this._emit("stepended", this.stepIndex);
            if (this.mode === "step") { this.playing = false; this._emit("state", this.getState()); return; }
            const interDelay = this.defaults.interStepDelay == null ? 600 : this.defaults.interStepDelay;
            if (this.stepIndex >= this.steps.length - 1) {
              if (this.meta.loop) { this.phase = "delay"; this.delayLeft = interDelay; this.pendingIndex = 0; }
              else { this.playing = false; this._emit("ended"); this._emit("state", this.getState()); return; }
            } else { this.phase = "delay"; this.delayLeft = interDelay; this.pendingIndex = this.stepIndex + 1; }
          }
          this._loop();
        }
      }

            "motions": [

              { "target": "#pinch-roll-top-blade", "type": "transform", "property": "rotate", "from": 0, "to": 360, "duration": 900, "easing": "linear", "pivot": [900, 301.25], "repeat": -1 },
              { "target": "#pinch-roll-bottom", "type": "transform", "property": "rotate", "from": 0, "to": -360, "duration": 900, "easing": "linear", "pivot": [900, 358.75], "repeat": -1 },

      (function () {
        const svg = document.querySelector("#stage svg");
        const anim = ANIMATION;
        document.title = (anim.meta && anim.meta.title) || "機械動作説明";
        const engine = new AnimationEngine(svg, anim);

        // --- 板材プロファイルの動的生成 ---
        // クランプ／カッターの押し下げ量とクランプ位置から、板の通り線を毎フレーム再構築する。
        // クランプ⇔カッター間は水平、両ガイドロールへ向かう区間は水平接線のS字曲線で滑らかに繋ぐ。
        const PLATE = { tN: 327.25, bN: 332.75, dip: 4.75, xExit: 215, xCut: 600, xEntry: 692, xClampBase: 435, L: -2000, R: 2200 };
        const sCurve = (xa, ya, xb, yb) => { const m = (xa + xb) / 2; return `C ${m} ${ya} ${m} ${yb} ${xb} ${yb} `; };
        function plateEdge(yBase, cb, kb, xClamp) {
          const { dip, xExit, xCut, xEntry, L, R } = PLATE;
          const yC = yBase + dip * cb, yK = yBase + dip * kb;
          return `M ${L} ${yBase} L ${xExit} ${yBase} ` + sCurve(xExit, yBase, xClamp, yC) +
                 `L ${xCut} ${yK} ` + sCurve(xCut, yK, xEntry, yBase) + `L ${R} ${yBase}`;
        }
        function plateFill(cb, kb, xClamp) {
          const { tN, bN, dip, xExit, xCut, xEntry, L, R } = PLATE;
          const tC = tN + dip * cb, tK = tN + dip * kb, bC = bN + dip * cb, bK = bN + dip * kb;
          let d = `M ${L} ${tN} L ${xExit} ${tN} ` + sCurve(xExit, tN, xClamp, tC) +
                  `L ${xCut} ${tK} ` + sCurve(xCut, tK, xEntry, tN) + `L ${R} ${tN} `;
          d += `L ${R} ${bN} L ${xEntry} ${bN} ` + sCurve(xEntry, bN, xCut, bK) +
               `L ${xClamp} ${bC} ` + sCurve(xClamp, bC, xExit, bN) + `L ${L} ${bN} Z`;
          return d;
        }
        function getTranslate(sel) {
          const el = svg.querySelector(sel); if (!el) return { x: 0, y: 0 };
          const tr = el.getAttribute("transform"); if (!tr) return { x: 0, y: 0 };
          const m = /translate\(\s*(-?[\d.]+)[ ,]+(-?[\d.]+)/.exec(tr);
          return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : { x: 0, y: 0 };
        }
        const clamp01 = (v) => Math.min(Math.max(v, 0), 1);
        const plateFillEl = svg.querySelector("#plate-fill");
        const plateTopEl = svg.querySelector("#plate-top");
        const plateBotEl = svg.querySelector("#plate-bot");
        function updatePlate() {
          if (!plateFillEl) return;
          // 板の押し下げ量はクランプ位置で決まる。クランプ⇔カッター中心は水平、
          // カッター中心⇔ガイドロールはS字曲線。上カッター刃の昇降は板形状に影響させない。
          const cb = clamp01(getTranslate("#upper-clamp-head").y / 41.5);
          const xClamp = PLATE.xClampBase + getTranslate("#clamp-carriage").x;
          plateFillEl.setAttribute("d", plateFill(cb, cb, xClamp));
          plateTopEl.setAttribute("d", plateEdge(PLATE.tN, cb, cb, xClamp));
          plateBotEl.setAttribute("d", plateEdge(PLATE.bN, cb, cb, xClamp));
        }
        engine.afterRender = updatePlate;
        updatePlate();
        const els = {
          stepList: document.getElementById("step-list"),
          stepName: document.getElementById("step-name"),
          stepDesc: document.getElementById("step-desc"),
          playBtn: document.getElementById("play-btn"),
          prevBtn: document.getElementById("prev-btn"),
          nextBtn: document.getElementById("next-btn"),
          modeCont: document.getElementById("mode-continuous"),
          modeStep: document.getElementById("mode-step"),
          speed: document.getElementById("speed"),
          speedVal: document.getElementById("speed-val"),
        };
        const sorted = [...anim.steps].sort((a, b) => (a.no || 0) - (b.no || 0));
        els.stepList.innerHTML = "";
        sorted.forEach((step) => {
          const realIndex = anim.steps.indexOf(step);
          const li = document.createElement("li");
          li.className = step.auto ? "step-item step-item--auto" : "step-item step-item--manual"; li.dataset.index = realIndex;
          li.innerHTML = `<span class="step-no">${step.no || ""}</span><span class="step-label">${step.name || ""}</span>${step.auto ? '<span class="auto-tag">自動</span>' : '<span class="manual-tag">手動</span>'}`;
          li.addEventListener("click", () => engine.goToStep(realIndex, false));
          els.stepList.appendChild(li);
        });
        function renderStepInfo(index) {
          const step = anim.steps[index]; if (!step) return;
          els.stepName.textContent = `${step.no ? step.no + ". " : ""}${step.name || ""}`;
          els.stepDesc.textContent = step.description || "";
          const infoPanel = els.stepDesc.closest(".step-info");
          if (infoPanel) {
            els.stepDesc.style.fontSize = ""; let fs = 14;
            while (infoPanel.scrollHeight > infoPanel.clientHeight && fs > 11) { fs -= 0.5; els.stepDesc.style.fontSize = fs + "px"; }
          }
          els.stepList.querySelectorAll(".step-item").forEach((li) => { li.classList.toggle("active", Number(li.dataset.index) === index); });
        }
        function renderState(st) {
          els.playBtn.textContent = st.playing ? "⏸ 一時停止" : "▶ 再生";
          els.playBtn.classList.toggle("is-pause", st.playing);
          const stepOnly = st.mode === "step";
          els.prevBtn.disabled = !stepOnly || st.stepIndex <= 0;
          els.nextBtn.disabled = !stepOnly || st.stepIndex >= st.stepCount - 1;
          els.modeCont.classList.toggle("active", st.mode === "continuous");
          els.modeStep.classList.toggle("active", st.mode === "step");
        }
        engine.on("stepchange", renderStepInfo);
        engine.on("state", renderState);
        els.playBtn.addEventListener("click", () => engine.toggle());
        els.prevBtn.addEventListener("click", () => engine.prevStep());
        els.nextBtn.addEventListener("click", () => engine.nextStep());
        els.modeCont.addEventListener("click", () => engine.setMode("continuous"));
        els.modeStep.addEventListener("click", () => engine.setMode("step"));
        els.speed.addEventListener("input", () => { const v = Number(els.speed.value); engine.setSpeed(v); els.speedVal.textContent = "×" + v.toFixed(2); });
        renderStepInfo(0);
        renderState(engine.getState());
        els.speedVal.textContent = "×" + Number(els.speed.value).toFixed(2);
      })();
    </script>
